<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Archivo:wght@600&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1200px;height:630px;overflow:hidden;background:#161210;color:#f5efe6;font-family:'Archivo',sans-serif;position:relative;}
  .bgimg{position:absolute;inset:0;background:url('media/poster-reel2.jpg') center/cover;filter:grayscale(.25) contrast(1.05) brightness(.42) saturate(.9);}
  .scrim{position:absolute;inset:0;background:linear-gradient(110deg,rgba(20,17,15,.92) 38%,rgba(20,17,15,.35) 100%),radial-gradient(120% 100% at 90% 10%,transparent,rgba(20,17,15,.9));}
  .wrap{position:absolute;inset:0;padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;z-index:2;}
  .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .role{font-size:18px;letter-spacing:.32em;text-transform:uppercase;color:#e0633f;font-weight:600;}
  .kanji{font-family:'Noto Serif JP',serif;font-size:84px;color:#e0633f;line-height:1;}
  h1{font-family:'Prata',serif;font-size:128px;line-height:.92;letter-spacing:-.02em;}
  h1 .jp{display:block;font-family:'Noto Serif JP',serif;font-size:24px;color:#e0633f;letter-spacing:.18em;margin-top:18px;}
  .meta{display:flex;gap:34px;font-size:20px;color:#c8bfb4;letter-spacing:.04em;border-top:1px solid rgba(245,239,230,.18);padding-top:22px;}
  .meta b{color:#f5efe6;}
</style></head>
<body>
<div class="bgimg"></div><div class="scrim"></div>
<div class="wrap">
  <div class="top"><span class="role">Sound Director · DJ</span><span class="kanji" lang="ja">音</span></div>
  <h1>Ник Меньшов<span class="jp" lang="ja">ニック・メンショフ</span></h1>
  <div class="meta"><span><b>Москва</b> · с 2017</span><span>Член жюри <b>Top100 Awards</b></span><span><b>500+</b> событий · до <b>6000</b> гостей</span></div>
</div>
</body></html>
